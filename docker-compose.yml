# Docker Compose configuration for Simple Audiobook Vault
# For use with Komodo or standalone Docker Compose deployment
#
# Traefik Integration:
#   This configuration integrates with an external Traefik instance.
#   Set TRAEFIK_ENABLED=true and configure TRAEFIK_HOST to enable.

services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: sav-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-audiobook_vault}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-audiobook_vault}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sav-network

  # ==========================================================================
  # Backend API (NestJS)
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: sav-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-audiobook_vault}

      # Better Auth
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://backend:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}

      # Frontend URL (for CORS)
      UI_URL: ${UI_URL:-http://localhost:3001}

      # Application
      NODE_ENV: production
      APP_DATA_PATH: /data

      # OIDC Configuration (optional)
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
    volumes:
      # Application data (covers, cache, etc.)
      - app_data:/data
      # Audiobook library - mount your media folder here
      - ${AUDIOBOOK_LIBRARY_PATH:-./media/audiobooks}:/library/audiobooks:ro
      # Ebook library - mount your media folder here
      - ${EBOOK_LIBRARY_PATH:-./media/ebooks}:/library/ebooks:ro
    # Only expose ports when not using Traefik
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - sav-network
      - proxy
    labels:
      # Traefik configuration
      - "traefik.enable=true"
      # API router - handles /api/* requests
      - "traefik.http.routers.sav-api.entryPoints=https"
      - "traefik.http.routers.sav-api.rule=Host(`${TRAEFIK_HOST:-bookmark.test.example.com}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.sav-api.middlewares=local-only@file"
      - "traefik.http.routers.sav-api.tls=true"
      - "traefik.http.routers.sav-api.tls.certResolver=cloudflare"
      - "traefik.http.routers.sav-api.service=sav-api"
      - "traefik.http.services.sav-api.loadBalancer.server.port=3000"

  # ==========================================================================
  # Frontend Web App (Next.js)
  # ==========================================================================
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_URL: http://backend:3000
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    container_name: sav-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_URL: http://backend:3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NODE_ENV: production
    # Only expose ports when not using Traefik
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - sav-network
      - proxy
    labels:
      # Traefik configuration
      - "traefik.enable=true"
      # Frontend router - handles all other requests
      - "traefik.http.routers.sav-frontend.entryPoints=https"
      - "traefik.http.routers.sav-frontend.rule=Host(`${TRAEFIK_HOST:-bookmark.test.example.com}`)"
      - "traefik.http.routers.sav-frontend.middlewares=local-only@file"
      - "traefik.http.routers.sav-frontend.tls=true"
      - "traefik.http.routers.sav-frontend.tls.certResolver=cloudflare"
      - "traefik.http.routers.sav-frontend.service=sav-frontend"
      - "traefik.http.services.sav-frontend.loadBalancer.server.port=3001"
      # Lower priority so /api routes go to backend
      - "traefik.http.routers.sav-frontend.priority=1"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: sav-postgres-data
  app_data:
    name: sav-app-data

# =============================================================================
# Networks
# =============================================================================
networks:
  sav-network:
    name: sav-network
    driver: bridge
  # External Traefik network
  proxy:
    name: proxy
    external: true
