# Docker Compose configuration for Bookmark
# For use with Komodo or standalone Docker Compose deployment
#
# Traefik Integration:
#   This configuration integrates with an external Traefik instance.
#   Configure PUBLIC_URL to your domain (e.g., https://bookmark.example.com)

services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: bookmark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bookmark}
    volumes:
      - ${DATA_PATH:-/mnt/user/appdata/bookmark}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bookmark}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookmark-network

  # ==========================================================================
  # Backend API (NestJS)
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: bookmark-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bookmark}

      # Public URL - used for auth callbacks, CORS, etc.
      BETTER_AUTH_URL: ${PUBLIC_URL:?PUBLIC_URL is required}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      UI_URL: ${PUBLIC_URL}

      # Application
      NODE_ENV: production
      APP_DATA_PATH: /data

      # OIDC Configuration (optional)
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
    volumes:
      # Application data (covers, cache, etc.)
      - ${DATA_PATH:-/mnt/user/appdata/bookmark}/data:/data
      # Audiobook library - mount your media folder here
      - ${AUDIOBOOK_LIBRARY_PATH:-./media/audiobooks}:/library/audiobooks:ro
      # Ebook library - mount your media folder here
      - ${EBOOK_LIBRARY_PATH:-./media/ebooks}:/library/ebooks:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - bookmark-network
      - proxy
    labels:
      # Traefik configuration
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # API router - handles /api/* requests
      - "traefik.http.routers.bookmark-api.entryPoints=https"
      - "traefik.http.routers.bookmark-api.rule=Host(`${TRAEFIK_HOST:-bookmark-test.example.com}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.bookmark-api.middlewares=local-only@file"
      - "traefik.http.routers.bookmark-api.tls=true"
      - "traefik.http.routers.bookmark-api.tls.certResolver=cloudflare"
      - "traefik.http.routers.bookmark-api.service=bookmark-api"
      - "traefik.http.services.bookmark-api.loadBalancer.server.port=3000"

  # ==========================================================================
  # Frontend Web App (Next.js)
  # ==========================================================================
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Build-time: internal URL for SSR API calls (used by next.config.js rewrites)
        API_URL: http://backend:3000
    container_name: bookmark-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Runtime: internal URL for SSR API calls (Next.js rewrites)
      API_URL: http://backend:3000
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - bookmark-network
      - proxy
    labels:
      # Traefik configuration
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # Frontend router - handles all other requests
      - "traefik.http.routers.bookmark-frontend.entryPoints=https"
      - "traefik.http.routers.bookmark-frontend.rule=Host(`${TRAEFIK_HOST:-bookmark-test.example.com}`)"
      - "traefik.http.routers.bookmark-frontend.middlewares=local-only@file"
      - "traefik.http.routers.bookmark-frontend.tls=true"
      - "traefik.http.routers.bookmark-frontend.tls.certResolver=cloudflare"
      - "traefik.http.routers.bookmark-frontend.service=bookmark-frontend"
      - "traefik.http.services.bookmark-frontend.loadBalancer.server.port=3001"
      # Lower priority so /api routes go to backend
      - "traefik.http.routers.bookmark-frontend.priority=1"

# =============================================================================
# Networks
# =============================================================================
networks:
  bookmark-network:
    name: bookmark-network
    driver: bridge
  # External Traefik network
  proxy:
    name: proxy
    external: true
