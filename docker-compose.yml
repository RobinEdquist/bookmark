# Docker Compose configuration for Bookmark
# Build from source and run locally
#
# Usage:
#   1. Copy example.env to .env and configure (optional for a local try-out)
#   2. Run: docker compose up -d
#
# Access the application at http://localhost:3001

services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: bookmark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bookmark}
    volumes:
      - ${DATA_PATH:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bookmark}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Bookmark (web app + API in a single container)
  # ==========================================================================
  bookmark:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookmark
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bookmark}

      # Public URL - used for auth callbacks, CORS, etc.
      # Defaults to localhost for local try-outs; set PUBLIC_URL for any real deployment
      BETTER_AUTH_URL: ${PUBLIC_URL:-http://localhost:3001}
      UI_URL: ${PUBLIC_URL:-http://localhost:3001}

      # Auth secret - auto-generated and persisted under /data on first start if unset
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}

      # Application
      NODE_ENV: production
      APP_DATA_PATH: /data

      # OIDC Configuration (optional)
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}

      # Integrations (optional)
      TRACKER_CLIENT_URL: ${TRACKER_CLIENT_URL:-}
      TRACKER_CLIENT_API_KEY: ${TRACKER_CLIENT_API_KEY:-}
      GR_FINDER_URL: ${GR_FINDER_URL:-}
    volumes:
      # Application data (covers, cache, auto-generated auth secret, etc.)
      - ${DATA_PATH:-./data}/app:/data
      # Audiobook library - mount your media folder here
      - ${AUDIOBOOK_LIBRARY_PATH:-./media/audiobooks}:/library/audiobooks:ro
      # Ebook library - mount your media folder here
      - ${EBOOK_LIBRARY_PATH:-./media/ebooks}:/library/ebooks:ro
      # Comic library - mount your media folder here
      - ${COMIC_LIBRARY_PATH:-./media/comics}:/library/comics:ro
    ports:
      - "${PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health && curl -f http://localhost:3001"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
